name: savora_app
description: "Savora - Local food waste reduction app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Supabase
  supabase_flutter: ^2.8.4

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Map — MapLibre GL (free, open source renderer)
  maplibre_gl: ^0.22.0

  # Location
  geolocator: ^13.0.2
  permission_handler: ^11.3.1

  # Push notifications
  flutter_local_notifications: ^17.2.4

  # Image & file picking
  image_picker: ^1.1.2
  file_picker: ^8.1.7

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  cached_network_image: ^3.4.1
  flutter_dotenv: ^5.2.1

  # UI & fonts
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_svg: ^2.0.10+1

  # Sharing & launching
  url_launcher: ^6.3.1
  share_plus: ^10.0.0

  # Time formatting
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - .env